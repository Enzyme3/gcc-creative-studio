steps:
  # 1. Build the container image using the standard Docker builder.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Image'
    env: ['DOCKER_BUILDKIT=1']
    args:
      [
        'build',
        '-t',
        '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA',
        '--build-arg',
        'BUILD_CMD=build-prd',
        '.',
      ]
    dir: frontend

  # 2. Push the container image to Google Artifact Registry.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Image'
    args:
      [
        'push',
        '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA',
      ]
    waitFor: ['Build Image']

  # 3. Deploy to Cloud Run using the gcloud CLI builder.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--quiet'
    waitFor: ['Push Image']

# BEST PRACTICE: Explicitly declare the image(s) built by this pipeline.
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
